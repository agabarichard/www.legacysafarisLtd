<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy Safaris | Contact</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <main>
    <section class="page-header">
      <div class="container">
        <h1>Start Your Safari</h1>
        <p>Let our experts craft your dream adventure</p>
      </div>
    </section>
    <section class="container section-padding">
      <div class="contact-wrapper">
        <div class="contact-info">
          <h3>Legacy Safaris Ltd</h3>
          <p><i class="fas fa-map-marker-alt"></i> Nairobi, Kenya / Arusha, Tanzania</p>
          <p><i class="fas fa-phone-alt"></i> +254 712 345 678</p>
          <p><i class="fas fa-envelope"></i> hello@legacysafaris.com</p>
          <p><i class="fas fa-clock"></i> Mon-Sat: 9am – 6pm (EAT)</p>
          <div class="social-links">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
          </div>
        </div>
        <form id="contactForm">
          <div class="form-group"><input type="text" id="name" placeholder="Full name" required></div>
          <div class="form-group"><input type="email" id="email" placeholder="Email address" required></div>
          <div class="form-group"><textarea rows="4" id="message" placeholder="Tell us about your dream safari..." required></textarea></div>
          <button type="submit" class="btn-primary">Send Inquiry <i class="fas fa-paper-plane"></i></button>
          <div id="formFeedback" class="success-message"></div>
        </form>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>
  <script src="js/include.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
