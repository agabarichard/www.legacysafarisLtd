<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy Safaris | Photo Gallery</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Gallery specific enhancements */
    .filter-gallery-bar {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }
    .filter-gallery-btn {
      background: transparent;
      border: 2px solid var(--savanna-gold);
      padding: 8px 24px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      color: var(--baobab-brown);
    }
    .filter-gallery-btn.active, .filter-gallery-btn:hover {
      background: var(--savanna-gold);
      color: white;
    }
    .gallery-item {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 12px 18px -8px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }
    .gallery-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.2);
    }
    .gallery-item img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      transition: transform 0.4s;
      display: block;
    }
    .gallery-item:hover img {
      transform: scale(1.03);
    }
    .gallery-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      color: white;
      padding: 1rem;
      transform: translateY(100%);
      transition: transform 0.3s;
      font-weight: 500;
    }
    .gallery-item:hover .gallery-caption {
      transform: translateY(0);
    }
    /* Lightbox (improved) */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      z-index: 1100;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox-img {
      max-width: 85%;
      max-height: 85%;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(255,255,255,0.2);
    }
    .close-lightbox {
      position: absolute;
      top: 30px;
      right: 40px;
      color: white;
      font-size: 2.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .close-lightbox:hover {
      color: var(--sunset-orange);
    }
    .lightbox-caption {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      font-size: 1rem;
    }
    @media (max-width: 768px) {
      .gallery-item img {
        height: 200px;
      }
      .filter-gallery-bar {
        gap: 0.7rem;
      }
      .filter-gallery-btn {
        padding: 5px 16px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <main>
    <section class="page-header">
      <div class="container">
        <h1>Moments in the Wild</h1>
        <p>Through the lens of Legacy Safari travellers & professional guides</p>
      </div>
    </section>
    <section class="container section-padding">
      <!-- Category Filters -->
      <div class="filter-gallery-bar" id="galleryFilterBar">
        <button class="filter-gallery-btn active" data-category="all">All Photos</button>
        <button class="filter-gallery-btn" data-category="wildlife">Wildlife</button>
        <button class="filter-gallery-btn" data-category="landscape">Landscapes</button>
        <button class="filter-gallery-btn" data-category="culture">Culture & People</button>
        <button class="filter-gallery-btn" data-category="safari">Safari Vehicles</button>
      </div>
      <!-- Gallery Grid -->
      <div class="gallery-grid" id="galleryGrid"></div>
    </section>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
      <span class="close-lightbox">&times;</span>
      <img class="lightbox-img" id="lightboxImg" alt="Enlarged view">
      <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
  </main>
  <div id="footer-placeholder"></div>

  <script src="js/include.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Full image gallery dataset with categories, captions, and high-quality Unsplash images
    const galleryImages = [
      { src: "images/image1.jpg", category: "wildlife", caption: "Lion resting in Maasai Mara" },
      { src: "images/image2.jpg", category: "wildlife", caption: "Zebra herd at sunset" },
      { src: "images/image3.jpg", category: "wildlife", caption: "Elephant family with Kilimanjaro" },
      { src: "images/image4.jpg", category: "safari", caption: "Classic safari jeep on savanna" },
      { src: "images/image5.jpg", category: "wildlife", caption: "Mountain gorilla in Bwindi" },
      { src: "images/image6.jpg", category: "wildlife", caption: "Leopard in a tree, Serengeti" },
      { src: "images/image7.jpg", category: "landscape", caption: "Golden sunrise over savanna" },
      { src: "images/image8.jpg", category: "culture", caption: "Maasai warrior jumping dance" },
      { src: "images/image9.jpg", category: "landscape", caption: "Ngorongoro Crater view" },
      { src: "images/image10.jpg", category: "wildlife", caption: "Elephant dust bath" },
      { src: "images/image11.jpg", category: "safari", caption: "Hot air balloon over Mara" },
      { src: "images/image12.jpg", category: "culture", caption: "Local guide sharing stories" },
      { src: "images/image13.jpg", category: "landscape", caption: "Wildebeest crossing river" },
      { src: "images/image14.jpg", category: "wildlife", caption: "Cheetah cubs playing" },
      { src: "images/image15.jpg", category: "landscape", caption: "Acacia tree at sunset" },
      { src: "images/image16.jpg", category: "culture", caption: "Samburu women in traditional beads" },
      { src: "images/image17.jpg", category: "safari", caption: "Safari vehicle with giraffes" },
      { src: "images/image18.jpg", category: "wildlife", caption: "Herd of elephants" },
      { src: "images/image19.jpg", category: "wildlife", caption: "Gorilla family" },
      { src: "images/image20.jpg", category: "landscape", caption: "Zebras at waterhole" }
    ];

    // Render gallery based on selected category
    let currentCategory = "all";

    function renderGallery(category) {
      const container = document.getElementById('galleryGrid');
      if (!container) return;
      
      const filtered = category === "all" ? galleryImages : galleryImages.filter(img => img.category === category);
      
      container.innerHTML = filtered.map(img => `
        <div class="gallery-item" data-category="${img.category}">
          <img src="${img.src}" alt="${img.caption}" loading="lazy">
          <div class="gallery-caption">${img.caption}</div>
        </div>
      `).join('');
      
      // Re-attach lightbox events to new images
      attachLightboxEvents();
    }

    // Lightbox functionality
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCaption = document.getElementById('lightboxCaption');
    const closeLightbox = document.querySelector('.close-lightbox');
    
    function attachLightboxEvents() {
      const images = document.querySelectorAll('.gallery-item');
      images.forEach(item => {
        const img = item.querySelector('img');
        const caption = item.querySelector('.gallery-caption').innerText;
        item.addEventListener('click', () => {
          lightbox.classList.add('active');
          lightboxImg.src = img.src;
          lightboxCaption.innerText = caption;
        });
      });
    }
    
    // Close lightbox events
    if (closeLightbox) {
      closeLightbox.addEventListener('click', () => lightbox.classList.remove('active'));
    }
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) lightbox.classList.remove('active');
    });
    
    // Filter buttons
    function initGalleryFilters() {
      const filterBtns = document.querySelectorAll('.filter-gallery-btn');
      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          filterBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const category = btn.getAttribute('data-category');
          currentCategory = category;
          renderGallery(category);
        });
      });
    }
    
    // Run after header/footer loaded
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          renderGallery('all');
          initGalleryFilters();
        }, 100);
      });
    } else {
      setTimeout(() => {
        renderGallery('all');
        initGalleryFilters();
      }, 100);
    }
  </script>
</body>
</html>
