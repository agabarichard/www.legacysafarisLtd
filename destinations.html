<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy Safaris | Destinations</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <main>
    <section class="page-header">
      <div class="container">
        <h1>Wild Destinations</h1>
        <p>From the savannahs to the rainforests</p>
      </div>
    </section>
    <section class="container section-padding">
      <div class="destinations-grid">
        <div class="dest-card"><img src="images/image3.jpg" alt="Masai Mara"><h3>Masai Mara, Kenya</h3><p>The Great Migration & Big Five</p></div>

        <div class="dest-card"><img src="images/image5.jpg" alt="Bwindi"><h3>Bwindi, Uganda</h3><p>Mountain gorilla trekking</p></div>
        <div class="dest-card"><img src="images/image6.jpg" alt="Chobe"><h3>Chobe, Botswana</h3><p>Elephant herds & river safaris</p></div>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>
  <script src="js/include.js"></script>
