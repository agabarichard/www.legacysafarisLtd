<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy Safaris | Safari Packages</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .filter-btn {
      background: transparent;
      border: 2px solid var(--savanna-gold);
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      color: var(--baobab-brown);
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--savanna-gold);
      color: white;
    }
    /* Booking Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1200;
      justify-content: center;
      align-items: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: white;
      max-width: 500px;
      width: 90%;
      border-radius: 32px;
      padding: 2rem;
      position: relative;
      text-align: center;
    }
    /* Detailed Package Modal (larger) */
    .detail-modal {
      max-width: 750px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      text-align: left;
    }
    .detail-modal h3, .detail-modal h4 {
      color: var(--acacia-green);
      margin-top: 1rem;
    }
    .detail-modal ul {
      margin-left: 1.5rem;
      margin-bottom: 1rem;
    }
    .close-modal {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 1.8rem;
      cursor: pointer;
    }
    .modal input, .modal textarea {
      margin-bottom: 1rem;
      width: 100%;
      padding: 12px;
      border-radius: 28px;
      border: 1px solid #ddd0be;
    }
    .btn-small {
      background: var(--savanna-gold);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 8px;
    }
    .tour-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <main>
    <section class="page-header">
      <div class="container">
        <h1>Signature Safari Packages</h1>
        <p>Handpicked journeys – each with detailed itinerary, inclusions & expert guides</p>
      </div>
    </section>
    <section class="container section-padding">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All Packages</button>
        <button class="filter-btn" data-filter="budget">Budget ( < $2000 )</button>
        <button class="filter-btn" data-filter="premium">Premium ( ≥ $2000 )</button>
        <button class="filter-btn" data-filter="short">Short (≤ 5 days)</button>
        <button class="filter-btn" data-filter="long">Long (> 5 days)</button>
      </div>
      <div class="tours-grid" id="tours-container"></div>
    </section>
  </main>
  <div id="footer-placeholder"></div>

  <!-- Quick Booking Modal -->
  <div id="bookingModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h3 style="color: var(--acacia-green);">Request Booking</h3>
      <p id="modalTourName" style="font-weight: bold;"></p>
      <form id="modalBookingForm">
        <input type="text" id="modalName" placeholder="Full name" required>
        <input type="email" id="modalEmail" placeholder="Email address" required>
        <input type="text" id="modalTravelDate" placeholder="Preferred travel date" required>
        <textarea rows="3" id="modalMessage" placeholder="Additional requests"></textarea>
        <button type="submit" class="btn-primary">Send Request</button>
        <div id="modalFeedback" class="success-message"></div>
      </form>
    </div>
  </div>

  <!-- Detailed Package Modal -->
  <div id="detailModal" class="modal">
    <div class="modal-content detail-modal">
      <span class="close-modal" id="closeDetailModal">&times;</span>
      <div id="detailContent"></div>
    </div>
  </div>

  <script src="js/include.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
